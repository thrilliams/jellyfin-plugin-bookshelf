name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@4ae8e7f0e21f5d6544eaaf9869c02716d5d13b2b # master
    with:
      repository-name: jellyfin/jellyfin-plugin-bookshelf
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
