# Allows for the definition of PR and Issue /commands
name: '📟 Slash Command Dispatcher'

on:
  issue_comment:
    types:
      - created

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/command-dispatch.yaml@4ae8e7f0e21f5d6544eaaf9869c02716d5d13b2b # master
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
