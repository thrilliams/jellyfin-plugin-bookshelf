name: '🚀 Publish (Unstable) Plugin'

on:
  push:
    branches:
      - unstable
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/publish-unstable.yaml@4ae8e7f0e21f5d6544eaaf9869c02716d5d13b2b # master
    secrets:
      deploy-host: ${{ secrets.REPO_HOST }}
      deploy-user: ${{ secrets.REPO_USER }}
      deploy-key: ${{ secrets.REPO_KEY }}
      token: ${{ secrets.JF_BOT_TOKEN }}
