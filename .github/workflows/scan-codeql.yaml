name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@4ae8e7f0e21f5d6544eaaf9869c02716d5d13b2b # master
    with:
      repository-name: jellyfin/jellyfin-plugin-bookshelf
